<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>자유게시판 - 목록</title>
    <style>
        table {
            width: 100%;
            table-layout: fixed;
            border-collapse: collapse;
            margin-bottom: 10px;
        }
        th, td {
            padding: 10px;
            border: 1px solid #ccc;
            text-align: center;
        }
        th { background-color: #f4f4f4; }
        .pagination {
            margin-top: 20px;
            text-align: center;
        }
        .pagination a, .pagination strong {
            padding: 5px 10px;
            margin: 0 2px;
            text-decoration: none;
            border: 1px solid #ccc;
            color: #333;
        }
        .pagination strong {
            background-color: #333;
            color: white;
        }
        .search-area { margin-bottom: 20px; }
        .text-left { text-align: left; }
    </style>
</head>
<body>

<h1>자유게시판 - 목록</h1>

<!-- 검색 폼 -->
<div class="search-area">
    <form action="/board/free/list" method="get">
        <label>등록일</label>
        <!-- 서버에서 넘어온 startDate, endDate 값을 유지합니다 -->
        <input type="date" id="start_date" name="startDate" th:value="${startDate}">
        <span>~</span>
        <input type="date" id="end_date" name="endDate" th:value="${endDate}">

        <select name="category">
            <option value="">전체 카테고리</option>
            <option th:each="category : ${categoryList}"
                    th:value="${category.name}"
                    th:text="${category.name}"
                    th:selected="${category.name == selectedCategory}">
            </option>
        </select>

        <input type="text" name="keyword" placeholder="검색어를 입력해 주세요." th:value="${keyword}">
        <button type="submit">검색</button>
    </form>
</div>

<p th:text="'총 ' + ${totalCount} + '건'">총 0건</p>

<!-- 게시글 목록 테이블 -->
<table>
    <thead>
    <tr>
        <th style="width: 100px;">카테고리</th>
        <th style="width: 400px;">제목</th>
        <th style="width: 100px;">작성자</th>
        <th style="width: 80px;">조회수</th>
        <th style="width: 150px;">등록 일시</th>
        <th style="width: 150px;">수정 일시</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="board : ${boardList}">
        <!-- DTO 필드명 categoryName으로 수정 반영 -->
        <td th:text="${board.categoryName}">카테고리</td>
        <td class="text-left">
            <!-- 상세 보기 링크 추가 -->
            <a th:href="@{/board/free/view/{id}(id=${board.id})}" th:text="${board.title}">제목</a>
        </td>
        <td th:text="${board.author}">작성자</td>
        <td th:text="${board.viewCount}">0</td>
        <!-- LocalDateTime 포맷팅 (#temporals 사용) -->
        <td th:text="${#temporals.format(board.createdAt, 'yyyy-MM-dd HH:mm')}"></td>
        <td th:text="${board.updatedAt != null ? #temporals.format(board.updatedAt, 'yyyy-MM-dd HH:mm') : '-'}"></td>
    </tr>
    <!-- 데이터가 없을 때 표시 -->
    <tr th:if="${#lists.isEmpty(boardList)}">
        <td colspan="6">등록된 게시글이 없습니다.</td>
    </tr>
    </tbody>
</table>

<!-- 페이징 네비게이션: startPage, endPage가 null이 아닐 때만 동작 -->
<div class="pagination" th:if="${totalCount > 0 and startPage != null and endPage != null}">
    <!-- [이전] 버튼 -->
    <a th:if="${currentPage > 1}"
       th:href="@{/board/free/list(page=${currentPage - 1}, startDate=${startDate}, endDate=${endDate}, category=${selectedCategory}, keyword=${keyword})}">&lt;</a>

    <!-- 페이지 번호 루프 -->
    <span th:each="pageNum : ${#numbers.sequence(startPage, endPage)}">
        <strong th:if="${pageNum == currentPage}" th:text="${pageNum}"></strong>
        <a th:unless="${pageNum == currentPage}"
           th:href="@{/board/free/list(page=${pageNum}, startDate=${startDate}, endDate=${endDate}, category=${selectedCategory}, keyword=${keyword})}"
           th:text="${pageNum}"></a>
    </span>

    <!-- [다음] 버튼 -->
    <a th:if="${currentPage < totalPages}"
       th:href="@{/board/free/list(page=${currentPage + 1}, startDate=${startDate}, endDate=${endDate}, category=${selectedCategory}, keyword=${keyword})}">&gt;</a>
</div>

<div style="text-align: right; margin-top: 10px;">
    <button type="button" th:onclick="|location.href='/board/free/write'|">등록</button>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // 현재 날짜 (오늘)
    const today = new Date().toISOString().split('T')[0];

    const startDateInput = document.getElementById('start_date');
    const endDateInput = document.getElementById('end_date');

    // 검색 조건이 없을 때만 오늘 날짜로 초기화
    if (!startDateInput.value) startDateInput.value = today;
    if (!endDateInput.value) endDateInput.value = today;
    /*]]>*/
</script>

</body>
</html>
